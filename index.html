<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOCTERA STORE</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #111, #050505);
      color: #eaeaea;
      text-align: center;
    }

    header {
      padding: 40px 0 20px;
      font-size: 18px;
      letter-spacing: 6px;
      opacity: 0;
      animation: fadeSlide 1.5s ease forwards;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-20px);} 
      to { opacity: 0.7; transform: translateY(0);} 
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .product img {
      width: 100%;
      max-width: 320px;
      border-radius: 16px;
      transition: opacity 0.4s ease;
    }

    .buttons { margin-top: 20px; }

    button {
      margin: 6px;
      padding: 10px 18px;
      background: transparent;
      border: 1px solid #444;
      color: #ddd;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.25s ease;
    }

    button:hover {
      border-color: #888;
      color: #fff;
      transform: translateY(-2px);
    }

    .active {
      border-color: #fff;
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .selected {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.7;
    }

    .order {
      margin-top: 25px;
      padding: 14px 28px;
      border-radius: 12px;
      border: 1px solid #aaa;
      background: linear-gradient(145deg, #111, #1c1c1c);
      transition: 0.3s;
    }

    .order:hover {
      box-shadow: 0 0 25px rgba(255,255,255,0.2);
      transform: scale(1.03);
    }

    .order:active {
      transform: scale(0.97);
    }

    .size-guide {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 16px;
      border: 1px solid #777;
      border-radius: 30px;
      font-size: 13px;
      animation: pulse 2s infinite;
      cursor: pointer;
      z-index: 9999;
    }

    .size-calc {
  margin-top: 30px;
}

.size-calc input {
  display: block;
  width: 100%;
  max-width: 250px;
  margin: 8px auto;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #444;
  background: #111;
  color: #fff;
}

.size-calc button {
  margin-top: 10px;
}

#resultSize {
  margin-top: 15px;
  font-size: 16px;
}
    
    @keyframes pulse {
      0% { box-shadow: 0 0 0 rgba(255,255,255,0.2);} 
      50% { box-shadow: 0 0 20px rgba(255,255,255,0.4);} 
      100% { box-shadow: 0 0 0 rgba(255,255,255,0.2);} 
    }

    .size-section {
      margin-top: 120px;
      opacity: 0;
      transform: translateY(40px);
      transition: 0.8s ease;
    }

    .price {
      margin-top: 10px;
      font-size: 20px;
      letter-spacing: 1px;
    }

    .timer {
      margin-top: -10px;
      margin-bottom: 20px;
      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0.7;
    }
    
    .size-section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .size-section img {
      width: 100%;
      max-width: 500px;
      border-radius: 14px;
      margin-top: 15px;

      opacity: 0;
      transform: scale(0.95);
      transition: all 0.6s ease;
    }

.size-section.visible img {
  opacity: 1;
  transform: scale(1);
}

  </style>
</head>
<body>

<div class="size-guide" onclick="scrollToSizes()">Size Guide</div>

<header>NOCTERA STORE</header>

<div class="timer" id="timer">00:00:00</div>

<div class="container">

  <div class="product">
    <img id="mainImage" src="black.jpg">
  </div>

  <div class="buttons" id="colors">
    <button onclick="selectColor(this,'black.jpg','Black')">Black</button>
    <button onclick="selectColor(this,'red.jpg','Red')">Red</button>
    <button onclick="selectColor(this,'blue.jpg','Blue')">Blue</button>
    <button onclick="selectColor(this,'pink.jpg','Pink')">Pink</button>
    <button onclick="selectColor(this,'white.jpg','White')">White</button>
    <button onclick="selectColor(this,'yellow.jpg','Yellow')">Yellow</button>
    <button onclick="selectColor(this,'mint.jpg','Mint')">Mint</button>
  </div>

<div class="buttons" id="sizesBtns">
  <button onclick="selectSize(this,'S')">S</button>
  <button onclick="selectSize(this,'M')">M</button>
  <button onclick="selectSize(this,'L')">L</button>
  <button onclick="selectSize(this,'XL')">XL</button>
</div>

<div class="selected" id="selectedText">Выберите цвет и размер</div>

<div class="price">990 грн</div>

<button class="order" onclick="order()">Заказать</button>

<!-- РАЗМЕРНАЯ СЕТКА -->
<div id="sizes" class="size-section">
  <h3>Размерная сетка</h3>
  <img src="size.jpg">
</div>

<!-- КАЛЬКУЛЯТОР -->
<div class="size-calc">
  <h4>Подобрать размер</h4>

  <input type="number" id="chest" placeholder="Обхват груди (см)">
  <input type="number" id="waist" placeholder="Обхват талии (см)">
  <input type="number" id="hips" placeholder="Обхват бедер (см)">

  <button onclick="calculateSize()">Подобрать</button>

  <div id="resultSize"></div>
</div>

<script>
let selectedColor = null;
let selectedSize = null;

function clearActive(group) {
  group.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
}

function updateText() {
  const text = document.getElementById('selectedText');
  if (selectedColor && selectedSize) {
    text.innerText = `${selectedColor} / ${selectedSize}`;
  }
}

function startTimer() {
  let time = 3600; // 1 час

  setInterval(() => {
    let h = Math.floor(time / 3600);
    let m = Math.floor((time % 3600) / 60);
    let s = time % 60;

    document.getElementById('timer').innerText =
      `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

    if (time > 0) time--;
  }, 1000);
}

startTimer();
  
function selectColor(el, img, colorName) {
  selectedColor = colorName;

  const image = document.getElementById('mainImage');
  image.style.opacity = 0;

  setTimeout(() => {
    image.src = img;
    image.style.opacity = 1;
  }, 200);

  const group = document.getElementById('colors');
  clearActive(group);
  el.classList.add('active');

  updateText();
}

  function calculateSize() {
  const chest = parseInt(document.getElementById('chest').value);
  const waist = parseInt(document.getElementById('waist').value);
  const hips = parseInt(document.getElementById('hips').value);

  let size = '';

  // простая логика (можно потом подкрутить под твой товар)
  if (chest <= 90 && waist <= 70 && hips <= 95) {
    size = 'S';
  } else if (chest <= 100 && waist <= 80 && hips <= 105) {
    size = 'M';
  } else if (chest <= 110 && waist <= 90 && hips <= 115) {
    size = 'L';
  } else {
    size = 'XL';
  }

  document.getElementById('resultSize').innerText = `Ваш размер: ${size}`;

  // авто-выбор на сайте 🔥
  selectedSize = size;
}
  
function selectSize(el, size) {
  selectedSize = size;

  const group = document.getElementById('sizesBtns');
  clearActive(group);
  el.classList.add('active');

  updateText();
}

function order() {
  if (!selectedColor || !selectedSize) {
    alert('Выбери цвет и размер');
    return;
  }

  const message = `NOCTERA STORE%0AЦвет: ${selectedColor}%0AРазмер: ${selectedSize}`;
  const url = `https://t.me/noctera_store?text=${message}`;

  window.location.href = url;
}

function scrollToSizes() {
  document.getElementById('sizes').scrollIntoView({behavior:'smooth'});
}

window.addEventListener('scroll', () => {
  const section = document.getElementById('sizes');
  const rect = section.getBoundingClientRect();
  if (rect.top < window.innerHeight - 100) {
    section.classList.add('visible');
  }
});
</script>

</body>
</html>
